<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline – CalcWise</title>
  <link rel="stylesheet" href="/theme.css">
  <link rel="stylesheet" href="/styles.css">
  <!-- Google Analytics 4 -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JXGRCF9TPP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-JXGRCF9TPP');
  </script>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }

    .offline-icon {
      font-size: 5rem;
      margin-bottom: 1rem;
      filter: drop-shadow(0 0 20px rgba(108, 99, 255, 0.4));
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    p {
      color: var(--muted2);
      max-width: 400px;
      margin: 0 auto 2rem;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 0.8rem 2rem;
      border-radius: 12px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
    }

    .btn:hover {
      background: var(--accent2);
      transform: translateY(-2px);
    }

    .lang-hint {
      margin-top: 3rem;
      font-size: 0.85rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 1rem;
      width: 100%;
      max-width: 300px;
    }
  </style>
</head>

<body>
  <!-- Ambient orbs handled by styles.css -->
  <div class="offline-icon">📡</div>
  <h1>You are offline</h1>
  <p>It looks like you've lost your internet connection. We couldn't load the requested page.</p>
  <button class="btn" onclick="window.location.reload()">Try Again</button>

  <div class="lang-hint">
    يبدو أنك غير متصل بالإنترنت. يرجى التحقق من اتصالك والمحاولة مرة أخرى.
  </div>

  <script>
    (function () {
      const saved = localStorage.getItem('cw-theme');
      if (saved === 'light') { document.documentElement.setAttribute('data-theme', 'light'); }
    })();
  </script>
</body>

</html>
