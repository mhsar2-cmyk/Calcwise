<div class="field-row">
      <div class="field-group"><label for="ci-principal">Principal Amount</label>
        <div class="input-wrap has-prefix"><span class="input-prefix">$</span><input type="number" id="ci-principal"
            value="10000" min="0"></div>
      </div>
      <div class="field-group"><label for="ci-rate">Annual Interest Rate</label>
        <div class="input-wrap has-suffix"><input type="number" id="ci-rate" value="7" step="0.1" min="0"><span
            class="input-suffix">%</span></div>
      </div>
    </div>
    <div class="field-row">
      <div class="field-group"><label for="ci-years">Time Period (Years)</label><input type="number" id="ci-years"
          value="10" min="1"></div>
      <div class="field-group"><label for="ci-freq">Compound Frequency</label>
        <select id="ci-freq">
          <option value="1">Annually</option>
          <option value="4">Quarterly</option>
          <option value="12" selected>Monthly</option>
          <option value="365">Daily</option>
        </select>
      </div>
    </div>
    <div class="field-group"><label for="ci-contrib">Monthly Contribution</label>
      <div class="input-wrap has-prefix"><span class="input-prefix">$</span><input type="number" id="ci-contrib"
          value="200" min="0"></div>
    </div>
    <button class="calc-btn" data-action="calcCompound">Calculate Growth</button>
    <div class="results" id="r-compound">
      <h3>Results</h3>
      <div class="result-highlight"><span class="result-value" id="r-ci-final">$0</span>
        <div class="result-label">Final Balance</div>
      </div>
      <div class="result-grid">
        <div class="result-item"><span class="result-value" id="r-ci-contributed">$0</span>
          <div class="result-label">Total Contributed</div>
        </div>
        <div class="result-item"><span class="result-value" id="r-ci-earned">$0</span>
          <div class="result-label">Interest Earned</div>
        </div>
      </div>
    </div>
    <div class="modal-ad">Advertisement · 728×90</div>
