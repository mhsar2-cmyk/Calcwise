<div class="field-row">
      <div class="field-group"><label for="cc-balance">Current Balance</label>
        <div class="input-wrap has-prefix"><span class="input-prefix">$</span><input type="number" id="cc-balance"
            value="5000" min="0"></div>
      </div>
      <div class="field-group"><label for="cc-apr">APR</label>
        <div class="input-wrap has-suffix"><input type="number" id="cc-apr" value="21.5" step="0.1" min="0"><span
            class="input-suffix">%</span></div>
      </div>
    </div>
    <div class="field-group"><label for="cc-payment">Monthly Payment</label>
      <div class="input-wrap has-prefix"><span class="input-prefix">$</span><input type="number" id="cc-payment"
          value="200" min="0"></div>
    </div>
    <button class="calc-btn" data-action="calcCreditCard">Calculate Payoff</button>
    <div class="results" id="r-cc">
      <h3>Results</h3>
      <div class="result-highlight"><span class="result-value" id="r-cc-months">0 months</span>
        <div class="result-label">Time to Pay Off</div>
      </div>
      <div class="result-grid">
        <div class="result-item"><span class="result-value" id="r-cc-interest">$0</span>
          <div class="result-label">Total Interest Paid</div>
        </div>
        <div class="result-item"><span class="result-value" id="r-cc-total">$0</span>
          <div class="result-label">Total Paid</div>
        </div>
      </div>
    </div>
    <div class="modal-ad">Advertisement · 728×90</div>
