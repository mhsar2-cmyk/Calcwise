<div class="field-row">
      <div class="field-group"><label for="mac-cal">Daily Calories</label><input type="number" id="mac-cal" value="2200"
          min="0"></div>
      <div class="field-group"><label for="mac-goal">Goal</label>
        <select id="mac-goal">
          <option value="cut">Cut (high protein)</option>
          <option value="maintain" selected>Maintain (balanced)</option>
          <option value="bulk">Bulk (higher carbs)</option>
        </select>
      </div>
    </div>
    <button class="calc-btn" data-action="calcMacros">Calculate Macros</button>
    <div class="results" id="r-macros">
      <h3>Results</h3>
      <div class="result-grid">
        <div class="result-item"><span class="result-value" id="r-mac-protein" style="color:var(--pink)">0g</span>
          <div class="result-label">Protein</div>
        </div>
        <div class="result-item"><span class="result-value" id="r-mac-carbs" style="color:var(--yellow)">0g</span>
          <div class="result-label">Carbohydrates</div>
        </div>
        <div class="result-item"><span class="result-value" id="r-mac-fat" style="color:var(--orange)">0g</span>
          <div class="result-label">Fats</div>
        </div>
      </div>
      <div class="result-bar" id="r-mac-bar"></div>
    </div>
    <div class="modal-ad">Advertisement · 728×90</div>
