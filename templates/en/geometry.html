<div class="field-group"><label for="geo-shape">Shape</label>
      <select id="geo-shape" data-change="updateGeoFields()">
        <option value="circle" selected>Circle</option>
        <option value="rectangle">Rectangle</option>
        <option value="triangle">Triangle</option>
      </select>
    </div>

    <!-- Circle Fields -->
    <div id="geo-circle-fields">
      <div class="field-row">
        <div class="field-group"><label for="geo-r">Radius (r)</label><input type="number" id="geo-r" value="5" min="0">
        </div>
      </div>
    </div>

    <!-- Rectangle Fields -->
    <div id="geo-rect-fields" style="display:none;">
      <div class="field-row">
        <div class="field-group"><label for="geo-l">Length (l)</label><input type="number" id="geo-l" value="10"
            min="0"></div>
        <div class="field-group"><label for="geo-w">Width (w)</label><input type="number" id="geo-w" value="5" min="0">
        </div>
      </div>
    </div>

    <!-- Triangle Fields -->
    <div id="geo-tri-fields" style="display:none;">
      <div class="field-row">
        <div class="field-group"><label for="geo-b">Base (b)</label><input type="number" id="geo-b" value="6" min="0">
        </div>
        <div class="field-group"><label for="geo-h">Height (h)</label><input type="number" id="geo-h" value="4" min="0">
        </div>
      </div>
      <p class="result-note" style="margin-top:-0.5rem; margin-bottom:1rem;">Perimeter calculation assumes an isosceles
        triangle based on the provided height and base.</p>
    </div>

    <button class="calc-btn" data-action="calcGeometry">Calculate</button>
    <div class="results" id="r-geometry">
      <h3>Geometric Results</h3>
      <div class="result-highlight"><span class="result-value" id="r-geo-area">—</span>
        <div class="result-label">Area</div>
      </div>
      <div class="result-grid" style="margin-top:1rem;">
        <div class="result-item"><span class="result-value" id="r-geo-perim">—</span>
          <div class="result-label" id="r-geo-perim-lbl">Perimeter</div>
        </div>
      </div>
    </div>
    <div class="modal-ad">Advertisement · 728×90</div>
