<div class="field-row">
      <div class="field-group"><label for="cook-val">Amount</label>
        <input type="number" id="cook-val" value="1" min="0">
      </div>
      <div class="field-group"><label for="cook-from">From Unit</label>
        <select id="cook-from">
          <optgroup label="Volume (US)">
            <option value="cup" selected>Cups</option>
            <option value="tbsp">Tablespoons (tbsp)</option>
            <option value="tsp">Teaspoons (tsp)</option>
            <option value="floz">Fluid Ounces (fl oz)</option>
          </optgroup>
          <optgroup label="Volume (Metric)">
            <option value="ml">Milliliters (ml)</option>
            <option value="l">Liters (L)</option>
          </optgroup>
          <optgroup label="Weight">
            <option value="oz">Ounces (oz)</option>
            <option value="lb">Pounds (lb)</option>
            <option value="g">Grams (g)</option>
            <option value="kg">Kilograms (kg)</option>
          </optgroup>
        </select>
      </div>
    </div>

    <div class="field-group"><label for="cook-to">To Unit</label>
      <select id="cook-to">
        <optgroup label="Volume (US)">
          <option value="cup">Cups</option>
          <option value="tbsp" selected>Tablespoons (tbsp)</option>
          <option value="tsp">Teaspoons (tsp)</option>
          <option value="floz">Fluid Ounces (fl oz)</option>
        </optgroup>
        <optgroup label="Volume (Metric)">
          <option value="ml">Milliliters (ml)</option>
          <option value="l">Liters (L)</option>
        </optgroup>
        <optgroup label="Weight">
          <option value="oz">Ounces (oz)</option>
          <option value="lb">Pounds (lb)</option>
          <option value="g">Grams (g)</option>
          <option value="kg">Kilograms (kg)</option>
        </optgroup>
      </select>
    </div>

    <button class="calc-btn" data-action="calcCooking">Convert Measurement</button>
    <div class="results" id="r-cooking">
      <h3>Converted Amount</h3>
      <div class="result-highlight"><span class="result-value" id="r-cook-val">—</span>
        <div class="result-label" id="r-cook-lbl">Result</div>
      </div>
      <p class="result-note" style="margin-top:1rem;font-size:0.85rem;">Note: Converting between volume (cups/ml) and
        weight (g/oz) depends on the ingredient's density. This calculator performs strict volume-to-volume or
        weight-to-weight conversions.</p>
    </div>
    <div class="modal-ad">Advertisement · 728×90</div>
