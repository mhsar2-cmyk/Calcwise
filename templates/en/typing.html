<div class="typing-container">
    <div class="typing-toolbar"
        style="display: flex; justify-content: flex-end; align-items: center; margin-bottom: 1rem;">
        <div class="layout-toggle">
            <span style="font-size: 0.9rem; color: var(--muted2); margin-right: 0.5rem;">Keyboard Layout:</span>
            <select id="keyboard-layout" class="calc-input"
                style="width: auto; padding: 0.3rem 1rem; font-size: 0.85rem; display: inline-block;">
                <option value="pc">Windows (PC)</option>
                <option value="mac">Mac</option>
            </select>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-box">
            <div class="label">Time Elapsed</div>
            <div class="value" id="time-left">00:00</div>
        </div>
        <div class="stat-box">
            <div class="label">WPM</div>
            <div class="value" id="wpm">0</div>
        </div>
        <div class="stat-box">
            <div class="label">Accuracy</div>
            <div class="value" id="accuracy">100%</div>
        </div>
        <div class="stat-box">
            <div class="label">Errors</div>
            <div class="value" id="errors">0</div>
        </div>
    </div>

    <div style="position: relative; width: 100%;">
        <div class="text-display" id="text-display">
            <!-- Text spans will be injected here -->
        </div>

        <input type="text" class="typing-input" id="typing-input" placeholder="" autocomplete="off" autocorrect="off"
            spellcheck="false">
    </div>

    <div class="controls">
        <button class="calc-btn" id="restart-btn">Restart Test</button>
    </div>

    <div class="virtual-keyboard" id="keyboard">
        <div class="keyboard-row">
            <div class="key" data-code="Backquote">`</div>
            <div class="key" data-code="Digit1">1</div>
            <div class="key" data-code="Digit2">2</div>
            <div class="key" data-code="Digit3">3</div>
            <div class="key" data-code="Digit4">4</div>
            <div class="key" data-code="Digit5">5</div>
            <div class="key" data-code="Digit6">6</div>
            <div class="key" data-code="Digit7">7</div>
            <div class="key" data-code="Digit8">8</div>
            <div class="key" data-code="Digit9">9</div>
            <div class="key" data-code="Digit0">0</div>
            <div class="key" data-code="Minus">-</div>
            <div class="key" data-code="Equal">=</div>
            <div class="key special backspace" data-code="Backspace">←</div>
        </div>
        <div class="keyboard-row">
            <div class="key special tab" data-code="Tab">Tab</div>
            <div class="key" data-code="KeyQ">Q</div>
            <div class="key" data-code="KeyW">W</div>
            <div class="key" data-code="KeyE">E</div>
            <div class="key" data-code="KeyR">R</div>
            <div class="key" data-code="KeyT">T</div>
            <div class="key" data-code="KeyY">Y</div>
            <div class="key" data-code="KeyU">U</div>
            <div class="key" data-code="KeyI">I</div>
            <div class="key" data-code="KeyO">O</div>
            <div class="key" data-code="KeyP">P</div>
            <div class="key" data-code="BracketLeft">[</div>
            <div class="key" data-code="BracketRight">]</div>
        </div>
        <div class="keyboard-row">
            <div class="key special capslock" data-code="CapsLock">Caps</div>
            <div class="key" data-code="KeyA">A</div>
            <div class="key" data-code="KeyS">S</div>
            <div class="key" data-code="KeyD">D</div>
            <div class="key" data-code="KeyF">F</div>
            <div class="key" data-code="KeyG">G</div>
            <div class="key" data-code="KeyH">H</div>
            <div class="key" data-code="KeyJ">J</div>
            <div class="key" data-code="KeyK">K</div>
            <div class="key" data-code="KeyL">L</div>
            <div class="key" data-code="Semicolon">;</div>
            <div class="key" data-code="Quote">'</div>
            <div class="key" data-code="Backslash">\</div>
            <div class="key special enter" data-code="Enter">Enter</div>
        </div>
        <div class="keyboard-row">
            <div class="key special shift" data-code="ShiftLeft">Shift</div>
            <div class="key" id="key-intl" data-code="IntlBackslash" style="display: none;">`</div>
            <div class="key" data-code="KeyZ">Z</div>
            <div class="key" data-code="KeyX">X</div>
            <div class="key" data-code="KeyC">C</div>
            <div class="key" data-code="KeyV">V</div>
            <div class="key" data-code="KeyB">B</div>
            <div class="key" data-code="KeyN">N</div>
            <div class="key" data-code="KeyM">M</div>
            <div class="key" data-code="Comma">,</div>
            <div class="key" data-code="Period">.</div>
            <div class="key" data-code="Slash">/</div>
            <div class="key special shift" data-code="ShiftRight">Shift</div>
        </div>
        <div class="keyboard-row">
            <div class="key special space" data-code="Space"></div>
        </div>
    </div>

    <div id="result-summary" class="results hidden" style="margin-top: 0">
        <h3>Test Complete!</h3>
        <div class="result-highlight"><span class="result-value" id="final-wpm">0</span>
            <div class="result-label">Final WPM</div>
        </div>
        <div class="result-grid">
            <div class="result-item"><span class="result-value" id="final-acc">0%</span>
                <div class="result-label">Accuracy</div>
            </div>
            <div class="result-item"><span class="result-value" id="final-err">0</span>
                <div class="result-label">Errors</div>
            </div>
        </div>
    </div>
</div>
<div class="modal-ad" style="margin-top: 1.5rem">Advertisement · 728×90</div>
