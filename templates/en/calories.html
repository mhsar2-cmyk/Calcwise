<div class="field-row">
      <div class="field-group"><label for="cal-unit">Unit System</label>
        <select id="cal-unit" data-change="updateCalFields()">
          <option value="imperial">Imperial (lbs, in)</option>
          <option value="metric">Metric (kg, cm)</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field-group"><label for="cal-age">Age</label>
        <div class="input-wrap has-suffix"><input type="number" id="cal-age" value="30" min="1" max="120"><span
            class="input-suffix">yrs</span></div>
      </div>
      <div class="field-group"><label for="cal-sex">Sex</label><select id="cal-sex">
          <option value="male">Male</option>
          <option value="female">Female</option>
        </select></div>
    </div>
    <div id="cal-imperial-fields">
      <div class="field-row">
        <div class="field-group"><label for="cal-weight">Weight</label>
          <div class="input-wrap has-suffix"><input type="number" id="cal-weight" value="165" min="0"><span
              class="input-suffix">lbs</span></div>
        </div>
        <div class="field-group"><label for="cal-height">Height</label>
          <div class="input-wrap has-suffix"><input type="number" id="cal-height" value="68" min="0"><span
              class="input-suffix">in</span></div>
        </div>
      </div>
    </div>
    <div id="cal-metric-fields" style="display:none">
      <div class="field-row">
        <div class="field-group"><label for="cal-weight-kg">Weight</label>
          <div class="input-wrap has-suffix"><input type="number" id="cal-weight-kg" value="75" min="0" step="0.1"><span
              class="input-suffix">kg</span></div>
        </div>
        <div class="field-group"><label for="cal-height-cm">Height</label>
          <div class="input-wrap has-suffix"><input type="number" id="cal-height-cm" value="173" min="0"><span
              class="input-suffix">cm</span></div>
        </div>
      </div>
    </div>
    <div class="field-group"><label for="cal-activity">Activity Level</label>
      <select id="cal-activity">
        <option value="1.2">Sedentary (little or no exercise)</option>
        <option value="1.375">Light (1–3 days/week)</option>
        <option value="1.55" selected>Moderate (3–5 days/week)</option>
        <option value="1.725">Active (6–7 days/week)</option>
        <option value="1.9">Very Active (physical job or 2× training)</option>
      </select>
    </div>
    <div class="field-group"><label for="cal-goal">Goal</label>
      <select id="cal-goal">
        <option value="-500">Lose Weight (−500 cal/day)</option>
        <option value="0" selected>Maintain Weight</option>
        <option value="500">Gain Weight (+500 cal/day)</option>
      </select>
    </div>
    <button class="calc-btn" data-action="calcCalories">Calculate</button>
    <div class="results" id="r-calories">
      <h3>Results</h3>
      <div class="result-highlight"><span class="result-value" id="r-cal-target">0</span>
        <div class="result-label">Daily Calorie Target</div>
      </div>
      <div class="result-grid">
        <div class="result-item"><span class="result-value" id="r-cal-bmr">0</span>
          <div class="result-label">BMR (base rate)</div>
        </div>
        <div class="result-item"><span class="result-value" id="r-cal-tdee">0</span>
          <div class="result-label">TDEE (maintenance)</div>
        </div>
      </div>
    </div>
    <div class="modal-ad">Advertisement · 728×90</div>
