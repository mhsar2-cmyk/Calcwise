<div class="field-row">
      <div class="field-group"><label for="t-bill">Bill Amount</label>
        <div class="input-wrap has-prefix"><span class="input-prefix">$</span><input type="number" id="t-bill"
            value="85.50" step="0.01" min="0"></div>
      </div>
      <div class="field-group"><label for="t-tip">Tip Percentage</label>
        <div class="input-wrap has-suffix"><input type="number" id="t-tip" value="18" min="0"><span
            class="input-suffix">%</span></div>
      </div>
    </div>
    <div class="field-group"><label for="t-people">Number of People</label><input type="number" id="t-people" value="4"
        min="1"></div>
    <div class="tip-presets">
      <button class="tip-preset-btn" data-action="document.getElementById('t-tip').value=10;calcTip()">10%</button>
      <button class="tip-preset-btn" data-action="document.getElementById('t-tip').value=15;calcTip()">15%</button>
      <button class="tip-preset-btn tip-preset-btn active"
        data-action="document.getElementById('t-tip').value=18;calcTip()">18%</button>
      <button class="tip-preset-btn" data-action="document.getElementById('t-tip').value=20;calcTip()">20%</button>
      <button class="tip-preset-btn" data-action="document.getElementById('t-tip').value=25;calcTip()">25%</button>
    </div>
    <button class="calc-btn" data-action="calcTip">Calculate</button>
    <div class="results" id="r-tip">
      <h3>Results</h3>
      <div class="result-grid">
        <div class="result-item"><span class="result-value" id="r-t-tip">$0</span>
          <div class="result-label">Tip Amount</div>
        </div>
        <div class="result-item"><span class="result-value" id="r-t-total">$0</span>
          <div class="result-label">Total Bill</div>
        </div>
        <div class="result-item"><span class="result-value" id="r-t-per">$0</span>
          <div class="result-label">Per Person</div>
        </div>
      </div>
    </div>
    <div class="modal-ad">Advertisement · 728×90</div>
