<div class="countdown-container">
    <!-- Mode Toggle -->
    <div class="countdown-toggle-wrap">
        <button class="countdown-toggle-btn active" id="cd-mode-digital" onclick="setCountdownMode('digital')">
            <span class="toggle-icon">🔢</span> Digital
        </button>
        <button class="countdown-toggle-btn" id="cd-mode-analog" onclick="setCountdownMode('analog')">
            <span class="toggle-icon">🕐</span> Analog
        </button>
    </div>

    <!-- Inputs -->
    <div class="field-row">
        <div class="field-group">
            <label for="cd-date">Target Date</label>
            <input type="date" id="cd-date">
        </div>
        <div class="field-group">
            <label for="cd-time">Target Time</label>
            <input type="time" id="cd-time" value="00:00">
        </div>
    </div>
    <div class="field-row" style="gap:0.5rem">
        <button class="calc-btn" data-action="startCountdown">Start Countdown</button>
        <button class="calc-btn" style="background:var(--surface2);color:var(--muted2);border:1px solid var(--border)"
            data-action="resetCountdown">Reset</button>
    </div>

    <!-- Digital Display -->
    <div class="countdown-display" id="cd-display-digital">
        <div class="countdown-units">
            <div class="countdown-unit">
                <div class="countdown-value" id="cd-days">00</div>
                <div class="countdown-label">Days</div>
            </div>
            <div class="countdown-sep">:</div>
            <div class="countdown-unit">
                <div class="countdown-value" id="cd-hours">00</div>
                <div class="countdown-label">Hours</div>
            </div>
            <div class="countdown-sep">:</div>
            <div class="countdown-unit">
                <div class="countdown-value" id="cd-mins">00</div>
                <div class="countdown-label">Minutes</div>
            </div>
            <div class="countdown-sep">:</div>
            <div class="countdown-unit">
                <div class="countdown-value" id="cd-secs">00</div>
                <div class="countdown-label">Seconds</div>
            </div>
        </div>
    </div>

    <!-- Analog Display -->
    <div class="countdown-display" id="cd-display-analog" style="display:none">
        <div class="countdown-analog-wrap">
            <svg viewBox="0 0 200 200" class="countdown-clock-svg" id="cd-clock-svg">
                <!-- Outer ring -->
                <circle cx="100" cy="100" r="95" fill="none" stroke="var(--border)" stroke-width="2" opacity="0.3" />
                <!-- Progress ring -->
                <circle cx="100" cy="100" r="95" fill="none" stroke="var(--accent)" stroke-width="3"
                    stroke-dasharray="597" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90 100 100)"
                    id="cd-progress-ring" />
                <!-- Hour markers -->
                <g id="cd-markers" stroke="var(--muted)" stroke-width="1.5">
                    <line x1="100" y1="12" x2="100" y2="22" />
                    <line x1="144" y1="17.4" x2="139" y2="26.1" />
                    <line x1="178.6" y1="44" x2="170.9" y2="51.5" />
                    <line x1="188" y1="100" x2="178" y2="100" />
                    <line x1="182.6" y1="144" x2="173.9" y2="139" />
                    <line x1="144" y1="182.6" x2="139" y2="173.9" />
                    <line x1="100" y1="188" x2="100" y2="178" />
                    <line x1="56" y1="182.6" x2="61" y2="173.9" />
                    <line x1="17.4" y1="144" x2="26.1" y2="139" />
                    <line x1="12" y1="100" x2="22" y2="100" />
                    <line x1="17.4" y1="56" x2="26.1" y2="61" />
                    <line x1="56" y1="17.4" x2="61" y2="26.1" />
                </g>
                <!-- Center dot -->
                <circle cx="100" cy="100" r="4" fill="var(--accent)" />
                <!-- Hour hand -->
                <line x1="100" y1="100" x2="100" y2="45" stroke="var(--text)" stroke-width="4" stroke-linecap="round"
                    id="cd-hand-hour" transform="rotate(0 100 100)" />
                <!-- Minute hand -->
                <line x1="100" y1="100" x2="100" y2="30" stroke="var(--text)" stroke-width="2.5" stroke-linecap="round"
                    id="cd-hand-min" transform="rotate(0 100 100)" />
                <!-- Second hand -->
                <line x1="100" y1="110" x2="100" y2="25" stroke="var(--accent)" stroke-width="1.5"
                    stroke-linecap="round" id="cd-hand-sec" transform="rotate(0 100 100)" />
                <!-- Center cap -->
                <circle cx="100" cy="100" r="2.5" fill="var(--accent)" />
            </svg>
        </div>
        <!-- Small digital readout below analog -->
        <div class="countdown-analog-readout">
            <span id="cd-analog-days">0</span>d
            <span id="cd-analog-hours">00</span>h
            <span id="cd-analog-mins">00</span>m
            <span id="cd-analog-secs">00</span>s
        </div>
    </div>

    <!-- Status message -->
    <div class="countdown-status" id="cd-status"></div>

    <!-- Progress bar -->
    <div class="countdown-progress-wrap" id="cd-progress-wrap" style="display:none">
        <div class="countdown-progress-label">
            <span id="cd-progress-text">Progress</span>
            <span id="cd-progress-pct">0%</span>
        </div>
        <div class="countdown-progress-track">
            <div class="countdown-progress-fill" id="cd-progress-fill" style="width:0%"></div>
        </div>
    </div>
</div>
