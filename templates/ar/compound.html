<div class="field-row">
      <div class="field-group"><label for="ci-principal">المبلغ الأساسي</label>
        <div class="input-wrap has-prefix"><span class="input-prefix">ر.س</span><input type="number" id="ci-principal"
            value="10000" min="0"></div>
      </div>
      <div class="field-group"><label for="ci-rate">معدل الفائدة السنوي</label>
        <div class="input-wrap has-suffix"><input type="number" id="ci-rate" value="7" step="0.1" min="0"><span
            class="input-suffix">%</span></div>
      </div>
    </div>
    <div class="field-row">
      <div class="field-group"><label for="ci-years">المدة (بالسنوات)</label><input type="number" id="ci-years"
          value="10" min="1"></div>
      <div class="field-group"><label for="ci-freq">تكرار الاحتساب</label>
        <select id="ci-freq">
          <option value="1">سنوياً</option>
          <option value="4">ربع سنوي</option>
          <option value="12" selected>شهرياً</option>
          <option value="365">يومياً</option>
        </select>
      </div>
    </div>
    <div class="field-group"><label for="ci-contrib">مساهمة شهرية إضافية</label>
      <div class="input-wrap has-prefix"><span class="input-prefix">ر.س</span><input type="number" id="ci-contrib"
          value="200" min="0"></div>
    </div>
    <button class="calc-btn" data-action="calcCompound">احسب النمو</button>
    <div class="results" id="r-compound">
      <h3>النتائج</h3>
      <div class="result-highlight"><span class="result-value" id="r-ci-final">0</span>
        <div class="result-label">الرصيد النهائي</div>
      </div>
      <div class="result-grid">
        <div class="result-item"><span class="result-value" id="r-ci-contributed">0</span>
          <div class="result-label">إجمالي ما أودعته</div>
        </div>
        <div class="result-item"><span class="result-value" id="r-ci-earned">0</span>
          <div class="result-label">الفوائد المكتسبة</div>
        </div>
      </div>
    </div>
    <div class="modal-ad">إعلان · 728×90</div>
