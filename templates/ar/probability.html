<div class="field-group"><label for="prob-type">نوع الحساب</label>
      <select id="prob-type" data-change="updateProbFields()">
        <option value="basic" selected>احتمال حدث بسيط</option>
        <option value="comb">التوافيق (nCr)</option>
        <option value="perm">التباديل (nPr)</option>
      </select>
    </div>

    <!-- Basic Event Fields -->
    <div id="prob-basic-fields">
      <div class="field-row">
        <div class="field-group"><label for="prob-fav">عدد النتائج المطلوبة (الناجحة)</label><input type="number"
            id="prob-fav" value="1" min="0"></div>
        <div class="field-group"><label for="prob-total">إجمالي النتائج الممكنة</label><input type="number"
            id="prob-total" value="6" min="1"></div>
      </div>
    </div>

    <!-- Comb/Perm Fields -->
    <div id="prob-cp-fields" style="display:none;">
      <div class="field-row">
        <div class="field-group"><label for="prob-n">إجمالي العناصر (n)</label><input type="number" id="prob-n"
            value="5" min="0"></div>
        <div class="field-group"><label for="prob-r">العناصر المختارة (r)</label><input type="number" id="prob-r"
            value="3" min="0"></div>
      </div>
    </div>

    <button class="calc-btn" data-action="calcProbability">احسب الاحتمال</button>
    <div class="results" id="r-probability">
      <h3>النتائج</h3>
      <div class="result-highlight"><span class="result-value" id="r-prob-main" style="direction:ltr">—</span>
        <div class="result-label" id="r-prob-label">الاحتمال</div>
      </div>

      <div class="result-grid" id="r-prob-extras" style="margin-top:1rem; display:none;">
        <div class="result-item"><span class="result-value" id="r-prob-pct" style="direction:ltr">—</span>
          <div class="result-label">النسبة المئوية</div>
        </div>
        <div class="result-item"><span class="result-value" id="r-prob-odds" style="direction:ltr">—</span>
          <div class="result-label">الفرص (Odds)</div>
        </div>
      </div>
    </div>
    <div class="modal-ad">إعلان · 728×90</div>
