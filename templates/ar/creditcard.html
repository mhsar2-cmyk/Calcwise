<div class="field-row">
      <div class="field-group"><label for="cc-balance">الرصيد الحالي</label>
        <div class="input-wrap has-prefix"><span class="input-prefix">ر.س</span><input type="number" id="cc-balance"
            value="5000" min="0"></div>
      </div>
      <div class="field-group"><label for="cc-apr">نسبة الفائدة السنوية APR</label>
        <div class="input-wrap has-suffix"><input type="number" id="cc-apr" value="21.5" step="0.1" min="0"><span
            class="input-suffix">%</span></div>
      </div>
    </div>
    <div class="field-group"><label for="cc-payment">الدفعة الشهرية</label>
      <div class="input-wrap has-prefix"><span class="input-prefix">ر.س</span><input type="number" id="cc-payment"
          value="200" min="0"></div>
    </div>
    <button class="calc-btn" data-action="calcCreditCard">احسب موعد السداد</button>
    <div class="results" id="r-cc">
      <h3>النتائج</h3>
      <div class="result-highlight"><span class="result-value" id="r-cc-months">0 شهر</span>
        <div class="result-label">مدة السداد</div>
      </div>
      <div class="result-grid">
        <div class="result-item"><span class="result-value" id="r-cc-interest">0</span>
          <div class="result-label">إجمالي الفوائد المدفوعة</div>
        </div>
        <div class="result-item"><span class="result-value" id="r-cc-total">0</span>
          <div class="result-label">إجمالي المدفوع</div>
        </div>
      </div>
    </div>
    <div class="modal-ad">إعلان · 728×90</div>
