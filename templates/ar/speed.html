<div class="field-group"><label for="spd-solve">أريد حساب:</label>
      <select id="spd-solve" data-change="updateSpeedFields()">
        <option value="speed" selected>السرعة</option>
        <option value="distance">المسافة</option>
        <option value="time">الزمن</option>
      </select>
    </div>

    <div class="field-row" id="spd-inputs">
      <div class="field-group" id="spd-dist-field"><label for="spd-dist">المسافة</label>
        <div class="input-wrap has-suffix">
          <input type="number" id="spd-dist" value="100" min="0">
          <select id="spd-dist-unit" class="input-suffix standalone"
            style="width:70px; border:none; background:transparent;">
            <option value="km" selected>كم</option>
            <option value="mi">ميل</option>
            <option value="m">متر</option>
          </select>
        </div>
      </div>

      <div class="field-group" id="spd-time-field"><label for="spd-h">الزمن</label>
        <div style="display:flex; gap:0.5rem; direction:ltr;">
          <div class="input-wrap has-suffix" style="flex:1;"><input type="number" id="spd-h" value="1" min="0"
              placeholder="0"><span class="input-suffix">ساعة</span></div>
          <div class="input-wrap has-suffix" style="flex:1;"><input type="number" id="spd-m" value="30" min="0" max="59"
              placeholder="0"><span class="input-suffix">دقيقة</span></div>
        </div>
      </div>

      <div class="field-group" id="spd-speed-field" style="display:none;"><label for="spd-speed">السرعة</label>
        <div class="input-wrap has-suffix">
          <input type="number" id="spd-speed" value="60" min="0">
          <select id="spd-speed-unit" class="input-suffix standalone"
            style="width:85px; border:none; background:transparent;">
            <option value="kph" selected>كم/س</option>
            <option value="mph">ميل/س</option>
            <option value="mps">م/ث</option>
          </select>
        </div>
      </div>
    </div>

    <button class="calc-btn" data-action="calcSpeed">احسب</button>
    <div class="results" id="r-speed">
      <h3>النتيجة</h3>
      <div class="result-highlight"><span class="result-value" id="r-spd-val"
          style="direction:ltr;font-size:1.8rem;">—</span>
        <div class="result-label" id="r-spd-lbl">السرعة</div>
      </div>
    </div>
    <div class="modal-ad">إعلان · 728×90</div>
