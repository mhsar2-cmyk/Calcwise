<div class="field-row">
      <div class="field-group"><label for="fuel-dist">مسافة الرحلة</label>
        <div class="input-wrap has-suffix"><input type="number" id="fuel-dist" value="300" min="0"><span
            class="input-suffix">كم</span></div>
      </div>
      <div class="field-group"><label for="fuel-mpg">استهلاك الوقود</label>
        <div class="input-wrap has-suffix"><input type="number" id="fuel-mpg" value="12" min="0"><span
            class="input-suffix">لتر/١٠٠كم</span></div>
      </div>
    </div>
    <div class="field-group"><label for="fuel-price">سعر الوقود للتر</label>
      <div class="input-wrap has-prefix"><span class="input-prefix">ر.س</span><input type="number" id="fuel-price"
          value="2.18" step="0.01" min="0"></div>
    </div>
    <button class="calc-btn" data-action="calcFuelAR">احسب التكلفة</button>
    <div class="results" id="r-fuel">
      <h3>النتائج</h3>
      <div class="result-highlight"><span class="result-value" id="r-fuel-cost">0</span>
        <div class="result-label">إجمالي تكلفة الوقود (ر.س)</div>
      </div>
      <div class="result-grid">
        <div class="result-item"><span class="result-value" id="r-fuel-liters">0</span>
          <div class="result-label">لترات مطلوبة</div>
        </div>
        <div class="result-item"><span class="result-value" id="r-fuel-per100">0</span>
          <div class="result-label">تكلفة كل ١٠٠ كم</div>
        </div>
      </div>
    </div>
    <div class="modal-ad">إعلان · 728×90</div>
