<div class="field-row">
      <div class="field-group"><label for="t-bill">مبلغ الفاتورة</label>
        <div class="input-wrap has-prefix"><span class="input-prefix">ر.س</span><input type="number" id="t-bill"
            value="85.50" step="0.01" min="0"></div>
      </div>
      <div class="field-group"><label for="t-tip">نسبة البقشيش</label>
        <div class="input-wrap has-suffix"><input type="number" id="t-tip" value="18" min="0"><span
            class="input-suffix">%</span></div>
      </div>
    </div>
    <div class="field-group"><label for="t-people">عدد الأشخاص</label><input type="number" id="t-people" value="4"
        min="1"></div>
    <div style="display:flex;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap;">
      <button data-action="document.getElementById('t-tip').value=10;calcTip()"
        style="flex:1;padding:0.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:0.88rem;">١٠٪</button>
      <button data-action="document.getElementById('t-tip').value=15;calcTip()"
        style="flex:1;padding:0.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:0.88rem;">١٥٪</button>
      <button data-action="document.getElementById('t-tip').value=18;calcTip()"
        style="flex:1;padding:0.5rem;background:var(--accent);border:none;border-radius:8px;color:white;cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:0.88rem;font-weight:700;">١٨٪</button>
      <button data-action="document.getElementById('t-tip').value=20;calcTip()"
        style="flex:1;padding:0.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:0.88rem;">٢٠٪</button>
      <button data-action="document.getElementById('t-tip').value=25;calcTip()"
        style="flex:1;padding:0.5rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:0.88rem;">٢٥٪</button>
    </div>
    <button class="calc-btn" data-action="calcTip">احسب</button>
    <div class="results" id="r-tip">
      <h3>النتائج</h3>
      <div class="result-grid">
        <div class="result-item"><span class="result-value" id="r-t-tip">0</span>
          <div class="result-label">مبلغ البقشيش</div>
        </div>
        <div class="result-item"><span class="result-value" id="r-t-total">0</span>
          <div class="result-label">إجمالي الفاتورة</div>
        </div>
        <div class="result-item"><span class="result-value" id="r-t-per">0</span>
          <div class="result-label">نصيب كل شخص</div>
        </div>
      </div>
    </div>
