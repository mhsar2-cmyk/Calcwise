<div class="field-group"><label for="pace-solve">احسب</label>
      <select id="pace-solve" data-change="updatePaceFields()">
        <option value="pace">الإيقاع (بمعرفة المسافة والوقت)</option>
        <option value="time">وقت الإنهاء (بمعرفة المسافة والإيقاع)</option>
        <option value="distance">المسافة (بمعرفة الوقت والإيقاع)</option>
      </select>
    </div>
    <div class="field-row" id="pace-dist-field">
      <div class="field-group"><label for="pace-dist">المسافة</label>
        <div class="input-wrap has-suffix"><input type="number" id="pace-dist" value="5" min="0" step="0.1"><span
            class="input-suffix">كم</span></div>
      </div>
    </div>
    <div class="field-row" id="pace-time-field">
      <div class="field-group"><label for="pace-h">ساعات</label><input type="number" id="pace-h" value="0" min="0">
      </div>
      <div class="field-group"><label for="pace-m">دقائق</label><input type="number" id="pace-m" value="28" min="0">
      </div>
      <div class="field-group"><label for="pace-s">ثواني</label><input type="number" id="pace-s" value="0" min="0">
      </div>
    </div>
    <div class="field-group" id="pace-pace-field" style="display:none">
      <label for="pace-min">الإيقاع (دقيقة/كم)</label>
      <div class="field-row">
        <input type="number" id="pace-min" value="5" min="0">
        <input type="number" id="pace-sec" value="30" min="0" max="59">
      </div>
    </div>
    <button class="calc-btn" data-action="calcPace">احسب</button>
    <div class="results" id="r-pace">
      <h3>النتيجة</h3>
      <div class="result-highlight"><span class="result-value" id="r-pace-result">—</span>
        <div class="result-label" id="r-pace-label">الإيقاع</div>
      </div>
    </div>
    <div class="modal-ad">إعلان · 728×90</div>
