<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Labs — LingoWise</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎥</text></svg>">

<body>
    <!-- NAVIGATION -->
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon">🎓</div> LingoWise
            </a>
            <div class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="courses.html">Courses</a>
                <a href="labs.html" class="active">Live Labs</a>
                <a href="blog.html">Blog</a>
            </div>
            <div class="nav-actions">
                <div class="toggle-pill lang-toggle">
                    <span class="toggle-option active" data-value="en">EN</span>

                </div>
                <a href="dashboard.html" class="btn btn-ghost btn-sm">Dashboard</a>
            </div>
        </div>

    <div class="section p-top-4xl">

                    <button class="btn btn-primary btn-sm m-top-md">Book Slot</button>
                </div>
                <div class="card p-xl">
                    <div style="font-size:3rem; margin-bottom:var(--space-md);">🌍</div>
                    <h4>Travel English Workshop</h4>
                    <p style="color:var(--text-muted);">Saturday at 10:00 AM</p>
                    <button class="btn btn-primary btn-sm m-top-md">Book Slot</button>
