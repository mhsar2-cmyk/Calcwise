<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — LingoWise</title>
    <meta name="description"
        content="Create your free LingoWise account to start your English language learning journey.">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CQ0F5LVG3J"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag("js", new Date());
        gtag("config", "G-CQ0F5LVG3J");
    </script>
</head>

<body>
    <div class="auth-container">

        <!-- Top-right Language Toggle for Auth Pages -->
        <div style="position:fixed;top:20px;right:20px;z-index:100;">
            <div class="toggle-pill lang-toggle" title="Toggle language">
                <span class="toggle-option" data-value="en" onclick="toggleLanguage('en')">EN</span>
                <span class="toggle-option active" data-value="ar" onclick="toggleLanguage('ar')">عر</span>
            </div>
        </div>
        <!-- Floating toggles for auth pages -->


        <div class="card auth-card card-glass">
            <div class="auth-header">
                <a href="index.html" class="nav-logo" style="justify-content:center;">
                    <div class="logo-icon">🎓</div>
                    <span data-i18n="auth-logo-text">LingoWise</span>
                </a>
                <h2 data-i18n="auth-create-title">Create Your Account ✨</h2>
                <p data-i18n="auth-create-desc">Start your learning journey today — 100% free. 🚀</p>
            </div>

            <div class="social-login">
                <button class="social-btn" data-i18n-title="auth-social-google" title="Google">G</button>
                <button class="social-btn" data-i18n-title="auth-social-apple" title="Apple">🍎</button>
                <button class="social-btn" data-i18n-title="auth-social-twitter" title="Twitter">𝕏</button>
            </div>

            <div class="auth-divider" data-i18n="auth-or-signup">or sign up with email</div>

            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="grid grid-2" style="gap:var(--space-md);">
                    <div class="form-group">
                        <label for="signup-first" data-i18n="auth-first-name">First Name</label>
                        <input type="text" class="form-control" id="signup-first" data-i18n-placeholder="auth-first-ph" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label for="signup-last" data-i18n="auth-last-name">Last Name</label>
                        <input type="text" class="form-control" id="signup-last" data-i18n-placeholder="auth-last-ph" placeholder="Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signup-email" data-i18n="auth-email">Email Address</label>
                    <input type="email" class="form-control" id="signup-email" data-i18n-placeholder="auth-email-ph" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="signup-password" data-i18n="auth-password">Password</label>
                    <input type="password" class="form-control" id="signup-password" data-i18n-placeholder="auth-password-ph" placeholder="Min. 8 characters"
                        required minlength="8">
                </div>

                <div class="form-group">
                    <label for="signup-confirm" data-i18n="auth-confirm">Confirm Password</label>
                    <input type="password" class="form-control" id="signup-confirm" data-i18n-placeholder="auth-confirm-ph" placeholder="Re-enter password"
                        required minlength="8">
                </div>

                <div class="form-group" style="display:flex;align-items:flex-start;gap:var(--space-sm);">
                    <input type="checkbox" id="signup-terms" style="width:auto;margin-top:3px;" required>
                    <label for="signup-terms" style="margin:0;font-size:0.82rem;color:var(--text-secondary);">
                        <span data-i18n="auth-terms">I agree to the</span> <a href="terms.html"
                            style="color:var(--primary-light);" data-i18n="auth-tos">Terms of Service</a> & <a
                            href="privacy.html" style="color:var(--primary-light);" data-i18n="auth-privacy">Privacy
                            Policy</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-gold btn-lg" style="width:100%;" data-i18n="auth-create-btn">Create
                    Free Account</button>
            </form>

            <div class="auth-footer">
                <span data-i18n="auth-has-account">Already have an account?</span> <a href="login.html"
                    style="color:var(--primary-light);font-weight:600;" data-i18n="auth-login-link">Log in</a>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <script src="js/main.js"></script>


    <!-- FLOATING THEME TOGGLE (CIRCULAR) -->
    <div class="floating-toggles"
        onclick="toggleTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark')"
        title="Toggle theme">
        <span class="theme-icon dark-icon">🌙</span>
        <span class="theme-icon light-icon">☀️</span>
    </div>
</body>

</html>
