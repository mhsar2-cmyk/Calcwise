<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In — LingoWise</title>
    <meta name="robots" content="noindex, nofollow">
    <meta name="description"
        content="Log in to your LingoWise account to access your learning dashboard and courses.">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-CQ0F5LVG3J"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag("js", new Date());
        gtag("config", "G-CQ0F5LVG3J");
    </script>
</head>

<body>
    <div class="auth-container">

        <!-- Top-right Language Toggle for Auth Pages -->
        <div style="position:fixed;top:20px;right:20px;z-index:100;">
            <div class="toggle-pill lang-toggle" title="Toggle language">
                <span class="toggle-option" data-value="en" onclick="toggleLanguage('en')">EN</span>
                <span class="toggle-option active" data-value="ar" onclick="toggleLanguage('ar')">عر</span>
            </div>
        </div>

        <div class="card auth-card card-glass">
            <div class="auth-header">
                <a href="index.html" class="nav-logo" style="justify-content:center;">
                    <div class="logo-icon">🎓</div>
                    <span data-i18n="auth-logo-text">LingoWise</span>
                </a>
                <h2 data-i18n="auth-welcome">Welcome Back 👋</h2>
                <p data-i18n="auth-login-desc">Log in to your account to access your learning progress. ✨</p>
            </div>

            <div class="social-login">
                <button class="social-btn" data-i18n-title="auth-social-google" title="Google">G</button>
                <button class="social-btn" data-i18n-title="auth-social-apple" title="Apple">🍎</button>
                <button class="social-btn" data-i18n-title="auth-social-twitter" title="Twitter">𝕏</button>
            </div>

            <div class="auth-divider" data-i18n="auth-or-email">or continue with email</div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="login-email" data-i18n="auth-email">Email Address</label>
                    <input type="email" class="form-control" id="login-email" data-i18n-placeholder="auth-email-ph" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label for="login-password" style="display:flex;justify-content:space-between;">
                        <span data-i18n="auth-password">Password</span>
                        <a href="#" style="font-size:0.82rem;color:var(--primary-light);" data-i18n="auth-forgot">Forgot
                            password?</a>
                    </label>
                    <input type="password" class="form-control" id="login-password" data-i18n-placeholder="auth-password-ph-login" placeholder="••••••••" required>
                </div>

                <div class="form-group" style="display:flex;align-items:center;gap:var(--space-sm);">
                    <input type="checkbox" id="login-remember" style="width:auto;">
                    <label for="login-remember" style="margin:0;font-size:0.88rem;color:var(--text-secondary);"
                        data-i18n="auth-remember">Remember me for 30 days</label>
                </div>

                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;" data-i18n="auth-login-btn">Log
                    In</button>
            </form>

            <div class="auth-footer">
                <span data-i18n="auth-no-account">Don't have an account?</span> <a href="signup.html"
                    style="color:var(--primary-light);font-weight:600;" data-i18n="auth-signup-link">Sign up free</a>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>
    <script src="js/main.js"></script>

    <!-- FLOATING THEME TOGGLE (CIRCULAR) -->
    <div class="floating-toggles"
        onclick="toggleTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark')"
        title="Toggle theme">
        <span class="theme-icon dark-icon">🌙</span>
        <span class="theme-icon light-icon">☀️</span>
    </div>
</body>

</html>
