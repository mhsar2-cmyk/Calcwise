<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings — LingoWise</title>
    <meta name="description" content="Manage your LingoWise account settings: profile, preferences, and learning goals.">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
    <style>
        .settings-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: var(--space-xl);
            min-height: calc(100vh - var(--header-height));
            padding-top: calc(var(--header-height) + var(--space-xl));
            padding-bottom: var(--space-3xl);
        }

        .settings-sidebar {
            position: sticky;
            top: calc(var(--header-height) + var(--space-md));
            height: fit-content;
        }

        .settings-nav {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .settings-nav-item {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-md) var(--space-lg);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition-fast);
            border-bottom: 1px solid var(--border-subtle);
            font-size: 0.9rem;
        }

        .settings-nav-item:last-child { border: none; }
        .settings-nav-item:hover { background: var(--bg-card-hover); color: var(--text-primary); }
        .settings-nav-item.active { background: rgba(108,92,231,0.12); color: var(--primary-light); border-right: 3px solid var(--primary); }
        .settings-nav-item .nav-icon { font-size: 1.1rem; width: 24px; text-align: center; }

        .settings-section { display: none; }
        .settings-section.active { display: block; }

        .settings-card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-lg);
            padding: var(--space-xl);
            margin-bottom: var(--space-xl);
        }

        .settings-card h3 {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: var(--space-lg);
            padding-bottom: var(--space-md);
            border-bottom: 1px solid var(--border-subtle);
        }

        .avatar-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-md) 0;
            border-bottom: 1px solid var(--border-subtle);
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
        }

        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-switch .slider {
            position: absolute;
            inset: 0;
            background: var(--border-default);
            border-radius: var(--radius-full);
            cursor: pointer;
            transition: .4s;
        }

        .toggle-switch .slider::before {
            content: "";
            position: absolute;
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        .toggle-switch input:checked + .slider { background-color: var(--primary); }
        .toggle-switch input:checked + .slider::before { transform: translateX(20px); }

        .stat-overview {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-md);
        }

        .stat-box {
            background: var(--bg-secondary);
            padding: var(--space-md);
            border-radius: var(--radius-md);
            text-align: center;
        }

        @media (max-width: 768px) {
            .settings-layout { grid-template-columns: 1fr; }
            .settings-sidebar { position: static; }
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo"><div class="logo-icon">🎓</div> LingoWise</a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="courses.html">Courses</a>
                <a href="dashboard.html">Dashboard</a>
            </div>
            <div class="nav-actions">
                <button class="btn btn-primary btn-sm" onclick="handleLogout()">Log Out</button>
            </div>
        </div>
    </nav>

    <div class="container settings-layout">
        <aside class="settings-sidebar">
            <div class="settings-nav">
                <div class="settings-nav-item active" onclick="showTab('profile')">
                    <span class="nav-icon">👤</span> Profile
                </div>
                <div class="settings-nav-item" onclick="showTab('preferences')">
                    <span class="nav-icon">⚙️</span> Preferences
                </div>
                <div class="settings-nav-item" onclick="showTab('notifications')">
                    <span class="nav-icon">🔔</span> Notifications
                </div>
                <div class="settings-nav-item" onclick="showTab('data')">
                    <span class="nav-icon">📊</span> My Learning Data
                </div>
                <div class="settings-nav-item" onclick="showTab('security')">
                    <span class="nav-icon">🔐</span> Security
                </div>
            </div>
        </aside>

        <main>
            <!-- PROFILE -->
            <div class="settings-section active" id="tab-profile">
                <div class="settings-card">
                    <h3>👤 Profile Information</h3>
                    <div style="display:flex; gap:20px; align-items:center; margin-bottom:20px;">
                        <div class="avatar-circle">U</div>
                        <button class="btn btn-ghost btn-sm">Change Avatar</button>
                    </div>
                    <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px;">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" class="form-control" id="profile-first" value="John">
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" class="form-control" id="profile-last" value="Doe">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>English Level</label>
                        <select class="form-control">
                            <option>Beginner (A1-A2)</option>
                            <option selected>Intermediate (B1-B2)</option>
                            <option>Advanced (C1-C2)</option>
                            <option>Business Professional</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="showToast('success', 'Profile updated!')">Save Changes</button>
                </div>
            </div>

            <!-- PREFERENCES -->
            <div class="settings-section" id="tab-preferences">
                <div class="settings-card">
                    <h3>🌐 Language & Display</h3>
                    <div class="form-group">
                        <label>Interface Language</label>
                        <select class="form-control" onchange="toggleLanguage(this.value)">
                            <option value="en">English</option>
                            <option value="ar">العربية (Arabic)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Target Language</label>
                        <select class="form-control" disabled>
                            <option>English (US/UK)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- DATA -->
            <div class="settings-section" id="tab-data">
                <div class="settings-card">
                    <h3>📊 Learning Progress</h3>
                    <div class="stat-overview">
                        <div class="stat-box">
                            <div style="font-size:1.5rem; font-weight:700;">12</div>
                            <div style="font-size:0.8rem; color:var(--text-muted);">Completed Lessons</div>
                        </div>
                        <div class="stat-box">
                            <div style="font-size:1.5rem; font-weight:700;">450</div>
                            <div style="font-size:0.8rem; color:var(--text-muted);">Words Saved</div>
                        </div>
                        <div style="text-align:center;">
                             <button class="btn btn-outline btn-sm" onclick="exportLearningData()">Download Progress (JSON)</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
    <script>
        function showTab(tabId) {
            document.querySelectorAll('.settings-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.settings-nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function exportLearningData() {
            const data = {
                user: "John Doe",
                progress: "Intermediate",
                wordsInBank: 450,
                completedCourses: ["Beg-101", "Grammar-Int"]
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'lingowise_progress.json';
            a.click();
            showToast('success', 'Progress data exported!');
        }
    </script>
    <div class="toast-container" id="toastContainer"></div>
</body>
</html>
